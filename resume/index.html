<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Resume</title>
    <meta name="description" content="Professional resume" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="assets/styles.css" />
  </head>
  <body>
    <div class="toolbar no-print">
      <label class="lang-picker">
        <span id="lang-label">Language</span>
        <select id="lang-select" aria-label="Language"></select>
      </label>
      <button id="print-btn" type="button" class="print-btn">Print</button>
    </div>

    <main class="resume" id="resume">
      <header class="header">
        <div class="header-main">
          <img id="avatar" class="avatar" alt="" hidden />
          <div>
            <h1 id="name" class="name"></h1>
            <p id="title" class="title"></p>
            <p id="tagline" class="tagline"></p>
            <p id="location" class="location"></p>
          </div>
        </div>
        <ul id="links" class="links"></ul>
      </header>

      <section id="summary-section" class="section">
        <h2 class="section-title" data-ui="summary"></h2>
        <p id="summary" class="summary"></p>
      </section>

      <section id="achievements-section" class="section">
        <h2 class="section-title" data-ui="achievements"></h2>
        <ul id="achievements" class="achievements"></ul>
      </section>

      <section id="experience-section" class="section">
        <h2 class="section-title" data-ui="experience"></h2>
        <div id="experience" class="timeline"></div>
      </section>

      <section id="projects-section" class="section">
        <h2 class="section-title" data-ui="projects"></h2>
        <div id="projects" class="cards"></div>
      </section>

      <section id="skills-section" class="section">
        <h2 class="section-title" data-ui="skills"></h2>
        <div id="skills" class="skills"></div>
      </section>

      <section id="education-section" class="section">
        <h2 class="section-title" data-ui="education"></h2>
        <div id="education" class="timeline"></div>
      </section>
    </main>

    <footer class="footer no-print">
      <span id="footer-text"></span>
    </footer>

    <script src="assets/app.js"></script>
  </body>
</html>
